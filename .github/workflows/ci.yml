name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # package-lock.json npm 11 ile üretiliyor; CI'daki npm'i buna sabitle ki
      # `npm ci` lock'u kabul etsin (Node 22 varsayılan npm 10 ile çözüm farkı oluşuyor).
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run verify
